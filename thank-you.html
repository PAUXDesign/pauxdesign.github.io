<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="./Public/Images/icon.png" type="image/png">
<title>Thank You — Paux Design</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Manrope:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<style>
.thanks-page {
  min-height: 100vh;
  padding: 140px 20px 80px;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
}
.thanks-card {
  width: min(760px, 100%);
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 16px 40px rgba(190,195,230,0.55);
  padding: 56px 42px;
  text-align: center;
  position: relative;
  isolation: isolate;
}
.thanks-card::before {
  content: '';
  position: absolute;
  inset: 10px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid rgba(38, 30, 72, 0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 20px rgba(38, 30, 72, 0.08);
  z-index: 0;
}
.thanks-card > * {
  position: relative;
  z-index: 1;
}
.thanks-kicker {
  font-family: var(--font-meta);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent);
  margin-bottom: 14px;
}
.thanks-title {
  font-family: var(--font-serif);
  font-size: clamp(30px, 4vw, 44px);
  line-height: 1.15;
  color: var(--dark);
  margin-bottom: 12px;
}
.thanks-text {
  color: var(--mid);
  font-size: 14px;
  line-height: 1.7;
  max-width: 540px;
  margin: 0 auto 28px;
}
@media (max-width: 700px) {
  .thanks-card { padding: 34px 22px; border-radius: 18px; }
  .thanks-card::before { inset: 8px; border-radius: 12px; }
}
</style>
</head>
<body>
<main class="thanks-page">
  <section class="thanks-card">
    <div class="thanks-kicker">Message sent</div>
    <h1 class="thanks-title">Thank you, I got your message.</h1>
    <p class="thanks-text">I will review your enquiry and reply within 24 hours with the next steps.</p>
    <a href="./index.html" class="btn btn-dark">Back to home</a>
  </section>
</main>
</body>
</html>
