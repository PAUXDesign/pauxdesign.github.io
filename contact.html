<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Paux Design</title>
<link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Manrope:wght@300;400;500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
<style>
.contact-page {
  min-height: 100vh;
  padding: 132px 20px 72px;
  background: var(--bg);
}
.contact-wrap {
  max-width: 820px;
  margin: 0 auto;
}
.contact-card {
  background: #ffffff;
  border: 1px solid var(--border);
  border-radius: 24px;
  box-shadow: 0 16px 40px rgba(190,195,230,0.55);
  padding: 42px;
  position: relative;
  isolation: isolate;
}
.contact-card::before {
  content: '';
  position: absolute;
  inset: 10px;
  border-radius: 16px;
  background: rgba(255, 255, 255, 0.62);
  border: 1px solid rgba(38, 30, 72, 0.05);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 8px 20px rgba(38, 30, 72, 0.08);
  z-index: 0;
}
.contact-card > * {
  position: relative;
  z-index: 1;
}
.contact-kicker {
  font-family: var(--font-meta);
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.11em;
  color: var(--accent);
  margin-bottom: 12px;
}
.contact-title {
  font-family: var(--font-serif);
  font-size: clamp(28px, 4vw, 42px);
  line-height: 1.15;
  color: var(--dark);
  margin-bottom: 12px;
}
.contact-sub {
  color: var(--mid);
  font-size: 14px;
  line-height: 1.7;
  margin-bottom: 28px;
}
.contact-form {
  display: grid;
  gap: 16px;
}
.contact-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(260px, 1fr));
  gap: 16px;
}
.contact-field {
  min-width: 0;
}
.contact-field label {
  display: block;
  font-family: var(--font-meta);
  font-size: 11px;
  color: var(--light);
  margin-bottom: 6px;
  letter-spacing: 0.04em;
}
.contact-field input,
.contact-field select,
.contact-field textarea {
  display: block;
  box-sizing: border-box;
  min-width: 0;
  max-width: 100%;
  width: 100%;
  border: 1px solid var(--border2);
  border-radius: 12px;
  background: #fff;
  color: var(--dark);
  font-family: var(--font-sans);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.contact-field input:focus,
.contact-field select:focus,
.contact-field textarea:focus {
  border-color: rgba(112,89,220,0.45);
  box-shadow: 0 0 0 3px rgba(112,89,220,0.12);
}
.contact-field textarea {
  min-height: 140px;
  resize: vertical;
}
.contact-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  margin-top: 8px;
}
.contact-actions .btn {
  width: auto !important;
}
.contact-error {
  display: none;
  border: 1px solid rgba(220, 38, 38, 0.25);
  background: rgba(220, 38, 38, 0.08);
  color: #8f1d1d;
  font-size: 12px;
  line-height: 1.5;
  border-radius: 10px;
  padding: 10px 12px;
}
.contact-error.show {
  display: block;
}
@media (max-width: 800px) {
  .contact-card { padding: 24px; border-radius: 18px; }
  .contact-card::before { inset: 8px; border-radius: 12px; }
  .contact-grid { grid-template-columns: 1fr; }
  .contact-actions { justify-content: flex-end; }
}
</style>
</head>
<body>
<nav>
  <div class="nav-inner" id="site-nav">
    <div class="nav-brand">
      <a href="./index.html"><img class="nav-brand-logo" src="./Public/Images/logo-name.png" alt="Paux Design"></a>
    </div>
    <ul class="nav-links" aria-label="Primary">
      <li><a href="./index.html#about">About</a></li>
      <li><a href="./index.html#services">Services</a></li>
      <li><a href="./index.html#work">Work</a></li>
      <li><a href="./index.html#faq">FAQ</a></li>
      <li><a href="./contact.html">Contact</a></li>
    </ul>
    <div class="nav-cta">
      <a href="./contact.html" class="btn btn-dark nav-cta-btn" style="padding:12px 18px;">Let's talk</a>
      <button class="nav-hamburger" id="navHamburger" onclick="toggleMobileNav()" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</nav>

<div class="nav-mobile-overlay" id="navMobileOverlay">
  <a href="./index.html#about" onclick="closeMobileNav()">About</a>
  <a href="./index.html#services" onclick="closeMobileNav()">Services</a>
  <a href="./index.html#work" onclick="closeMobileNav()">Work</a>
  <a href="./index.html#faq" onclick="closeMobileNav()">FAQ</a>
  <a href="./contact.html" onclick="closeMobileNav()">Contact</a>
  <div class="nav-mobile-divider"></div>
  <a href="./contact.html" onclick="closeMobileNav()" class="btn btn-dark nav-mobile-cta">Let's talk</a>
</div>

<main class="contact-page">
  <div class="contact-wrap">
    <div class="contact-card">
      <div class="contact-kicker">Contact</div>
      <h1 class="contact-title">Tell me about your project</h1>
      <p class="contact-sub">Fill in the form and I will receive it directly in my email. I normally reply within 24 hours.</p>

      <form class="contact-form" action="https://formsubmit.co/paulaalonso.design@gmail.com" method="POST" target="contact_submit_iframe" novalidate>
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" id="formSubject" value="New project enquiry from pauxdesign.com">
        <input type="hidden" name="_next" id="formNext" value="">

        <div class="contact-grid">
          <div class="contact-field">
            <label for="name">Name</label>
            <input id="name" name="Name" type="text" required>
          </div>
          <div class="contact-field">
            <label for="email">Email</label>
            <input id="email" name="Email" type="email" required>
          </div>
        </div>

        <div class="contact-grid">
          <div class="contact-field">
            <label for="company">Company</label>
            <input id="company" name="Company" type="text">
          </div>
          <div class="contact-field">
            <label for="service">Service</label>
            <select id="service" name="Service">
              <option value="General enquiry">General enquiry</option>
              <option value="UX Audit">UX Audit</option>
              <option value="Product Design">Product Design</option>
              <option value="Web Design">Web Design</option>
            </select>
          </div>
        </div>

        <div class="contact-field">
          <label for="message">Project details</label>
          <textarea id="message" name="Message" placeholder="What are you building and what do you need help with?" required></textarea>
        </div>

        <div class="contact-error" id="contactError" role="alert" aria-live="polite"></div>

        <div class="contact-actions">
          <button type="submit" class="btn btn-dark" id="contactSubmit">Send enquiry</button>
        </div>
      </form>
      <iframe name="contact_submit_iframe" title="contact submit" style="display:none;"></iframe>
    </div>
  </div>
</main>

<script>
function toggleMobileNav() {
  const btn = document.getElementById('navHamburger');
  const overlay = document.getElementById('navMobileOverlay');
  const isOpen = overlay.classList.contains('open');
  btn.classList.toggle('open', !isOpen);
  overlay.classList.toggle('open', !isOpen);
  document.body.style.overflow = isOpen ? '' : 'hidden';
}

function closeMobileNav() {
  document.getElementById('navHamburger').classList.remove('open');
  document.getElementById('navMobileOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

(() => {
  const topicMap = {
    'ux-audit': 'UX Audit',
    'product-design': 'Product Design',
    'web-design': 'Web Design',
    'project-enquiry': 'General enquiry',
    'start-project': 'General enquiry'
  };

  const subjectMap = {
    'ux-audit': 'UX Audit enquiry',
    'product-design': 'Product Design enquiry',
    'web-design': 'Web Design enquiry',
    'project-enquiry': 'Project enquiry',
    'start-project': 'Start a project enquiry'
  };

  const params = new URLSearchParams(window.location.search);
  const topic = params.get('topic');
  const service = document.getElementById('service');
  const subject = document.getElementById('formSubject');
  const form = document.querySelector('.contact-form');
  const emailInput = document.getElementById('email');
  const errorBox = document.getElementById('contactError');
  const submitBtn = document.getElementById('contactSubmit');
  const nextField = document.getElementById('formNext');

  function showError(message) {
    errorBox.textContent = message;
    errorBox.classList.add('show');
  }

  function clearError() {
    errorBox.classList.remove('show');
    errorBox.textContent = '';
  }

  if (topic && topicMap[topic]) {
    service.value = topicMap[topic];
    subject.value = subjectMap[topic] || 'New project enquiry from pauxdesign.com';
  }

  if (nextField) {
    const isHttp = window.location.protocol === 'http:' || window.location.protocol === 'https:';
    nextField.value = isHttp ? `${window.location.origin}/thank-you.html` : './thank-you.html';
  }

  if (form && emailInput && errorBox) {
    const validateEmail = (event) => {
      const value = emailInput.value.trim();
      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

      if (!value) {
        event.preventDefault();
        showError('Please enter your email before sending.');
        emailInput.focus();
        return false;
      }

      if (!emailPattern.test(value)) {
        event.preventDefault();
        showError('Please enter a valid email address (example@domain.com).');
        emailInput.focus();
        return false;
      }

      clearError();
      setTimeout(() => {
        window.location.href = './thank-you.html';
      }, 350);
      return true;
    };

    form.addEventListener('submit', validateEmail);
    if (submitBtn) {
      submitBtn.addEventListener('click', (event) => {
        validateEmail(event);
      });
    }
    emailInput.addEventListener('input', () => {
      if (errorBox.classList.contains('show')) clearError();
    });
  }
})();
</script>
</body>
</html>
